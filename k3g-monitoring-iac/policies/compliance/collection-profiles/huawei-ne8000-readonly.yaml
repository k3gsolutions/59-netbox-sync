profile_id: huawei-ne8000-readonly
vendor: Huawei
platform: NE8000
allowed_commands:
  - display version
  - display device
  - display interface brief
  - display ip interface brief
  - display ipv6 interface brief
  - display bgp peer
  - display bgp vpnv4 all peer
  - display bgp vpnv6 all peer
  - display ip routing-table protocol bgp
  - display route-policy
  - display ip ip-prefix
  - display ipv6 prefix
  - display snmp-agent sys-info
  - display current-configuration | include sysname
  - display current-configuration | include snmp-agent
  - display current-configuration | include ntp-service
  - display current-configuration | include ssh
  - display current-configuration | include stelnet
  - display current-configuration | include local-user
forbidden_patterns:
  - configure
  - system-view
  - commit
  - save
  - delete
  - undo
  - shutdown
  - reboot
  - reset
  - patch
  - sync
sensitive_patterns:
  - password
  - cipher
  - simple
  - authentication
  - community
  - snmp-agent community
  - local-user
  - ssh user
  - radius
  - tacacs
  - key-chain
  - private-key
