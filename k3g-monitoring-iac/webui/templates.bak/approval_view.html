{% extends "base.html" %}

{% block title %}Aprovação: {{ approval.id }}{% endblock %}

{% block content %}
<h2>Aprovação: {{ approval.id }}</h2>

<p><span class="badge badge-{{ approval.status }}">{{ approval.status }}</span></p>

<h3>Detalhes</h3>
<pre>{{ approval.data | tojson(indent=2) }}</pre>

<p>
    <a href="/reports/download?path={{ approval.path }}" class="button">Baixar JSON</a>
    <a href="/approvals" class="button">Voltar às aprovações</a>
</p>
{% endblock %}
