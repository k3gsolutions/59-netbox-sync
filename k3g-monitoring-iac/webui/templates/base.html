<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} — k3g Compliance</title>
    <!-- Use compliance_guided.css explicitly for everything for the modern premium feel -->
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='compliance_guided.css') }}">
</head>
<body>
    <!-- Premium Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="sidebar-logo-icon">✦</span>
            <span class="sidebar-logo-text">k3g Compliance</span>
        </div>

        <ul class="sidebar-nav">
            <li>
                <a href="/" class="sidebar-link">
                    <span class="sidebar-icon">◱</span> Painel
                </a>
            </li>
            <li>
                <a href="/devices" class="sidebar-link">
                    <span class="sidebar-icon">⌘</span> Dispositivos
                </a>
            </li>
            <li>
                <a href="/compliance" class="sidebar-link">
                    <span class="sidebar-icon">⚡</span> Compliance
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="sidebar-status">
                <span class="status-dot ok" id="dot"></span>
                <span id="api-status-label">Sistema Operacional</span>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div class="app-main">
        {% block header %}{% endblock %}

        <main class="app-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- The original app.js is removed since we use compliance_guided.js, but if other pages need it, we can include it -->
    <script>
        // Highlight current page
        document.querySelectorAll('.sidebar-link').forEach(link => {
            if (link.href === window.location.href || link.pathname === window.location.pathname) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
