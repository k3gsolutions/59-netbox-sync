{% extends "base.html" %}

{% block title %}Batch Result: {{ batch.id }}{% endblock %}

{% block content %}
<h2>Batch Result: {{ batch.id }}</h2>

<div class="card">
    <p><strong>Name:</strong> {{ batch.name }}</p>
    <p><strong>Arquivo:</strong> {{ batch.path }}</p>
    <a href="/reports/download?path={{ batch.path }}" class="button">Baixar</a>
</div>

<h3>Content</h3>
<div class="report-content">
    {{ batch.content | safe }}
</div>

<a href="/batch-results" class="button">Voltar aos resultados em lote</a>
{% endblock %}
