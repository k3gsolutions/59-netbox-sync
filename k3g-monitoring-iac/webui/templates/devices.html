{% extends "base.html" %}

{% block title %}Devices{% endblock %}

{% block content %}
<h2>Devices</h2>

{% if devices %}
    <table>
        <thead>
            <tr>
                <th>Device Name</th>
                <th>Last Update</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for device in devices %}
                <tr>
                    <td>{{ device.name }}</td>
                    <td>{{ device.mtime }}</td>
                    <td>
                        <a href="/devices/{{ device.name }}" class="button-small">Details</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>No devices found</p>
{% endif %}
{% endblock %}
